<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesiones del Congreso</title>
  <link rel="stylesheet" href="/static/sessions.css">
</head>
<body>

<div class="s-layout">

  <!-- Panel izquierdo: lista de streams -->
  <aside class="s-sidebar">
    <div class="s-sidebar-header">
      <div class="s-title">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="8"/>
          <path d="M8 7l6 3-6 3V7z" stroke-linejoin="round"/>
        </svg>
        Sesiones
      </div>
      <button id="refresh-btn" class="s-refresh-btn" title="Actualizar">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 9a8 8 0 1 0 1.6-4.8"/><path d="M1 4v4h4"/>
        </svg>
      </button>
    </div>

    <div class="s-list" id="s-list">
      <div class="s-loading" id="s-loading">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span>Cargando transmisiones...</span>
      </div>
    </div>
  </aside>

  <!-- Panel derecho: resumen -->
  <main class="s-main">
    <div class="s-empty" id="s-empty">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <circle cx="32" cy="32" r="28"/>
        <path d="M25 22l18 10-18 10V22z" stroke-linejoin="round"/>
      </svg>
      <p>Selecciona una sesión de la lista<br>para resumirla</p>
    </div>

    <div class="s-panel" id="s-panel" style="display:none">
      <div class="s-panel-header">
        <div class="s-video-badge" id="s-video-badge"></div>
        <div class="s-video-title" id="s-video-title"></div>
        <div class="s-video-meta" id="s-video-meta"></div>
      </div>

      <div class="s-actions">
        <a id="s-yt-link" href="#" target="_blank" class="s-yt-btn" style="display:none">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 5v10l9-5-9-5z"/></svg>
          Ver en YouTube
        </a>
        <button id="s-resumir-btn" class="s-resumir-btn">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="2" width="14" height="14" rx="2"/>
            <path d="M5 6h8M5 9h8M5 12h5"/>
          </svg>
          <span id="s-resumir-label">Resumir esta sesión</span>
        </button>
      </div>

      <div class="s-result" id="s-result"></div>
    </div>
  </main>

</div>

<script src="/static/sessions.js"></script>
</body>
</html>
