<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congreso IA</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<button id="sidebar-open" title="Abrir barra lateral">
  <svg viewBox="0 0 32 32" fill="none">
    <rect x="4" y="26" width="24" height="3" rx="1" fill="currentColor"/>
    <rect x="7" y="12" width="3" height="14" rx="1" fill="currentColor"/>
    <rect x="14.5" y="12" width="3" height="14" rx="1" fill="currentColor"/>
    <rect x="22" y="12" width="3" height="14" rx="1" fill="currentColor"/>
    <path d="M2 12h28M16 3L2 12h28L16 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
  </svg>
</button>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-toggle" title="Cerrar barra lateral">
        <svg class="logo-svg" viewBox="0 0 32 32" fill="none">
          <rect x="4" y="26" width="24" height="3" rx="1" fill="currentColor"/>
          <rect x="7" y="12" width="3" height="14" rx="1" fill="currentColor"/>
          <rect x="14.5" y="12" width="3" height="14" rx="1" fill="currentColor"/>
          <rect x="22" y="12" width="3" height="14" rx="1" fill="currentColor"/>
          <path d="M2 12h28M16 3L2 12h28L16 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button id="new-chat-btn" title="Nueva conversación">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M14.5 2.5a2.12 2.12 0 0 1 3 3L6 17l-4 1 1-4L14.5 2.5z"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-nav">
      <button class="sidenav-btn active" id="nav-chat" title="Conversaciones">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H7l-4 2V5a1 1 0 0 1 1-1z"/>
        </svg>
        Chats
      </button>
      <button class="sidenav-btn" id="nav-live" title="Live — Transcripción en vivo">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="8"/>
          <circle cx="10" cy="10" r="3" fill="currentColor" stroke="none"/>
        </svg>
        Live
      </button>
      <button class="sidenav-btn" id="nav-pdfs" title="PDFs del Congreso">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4a2 2 0 0 1 2-2h5l5 5v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4z"/>
          <path d="M12 2v5h5"/>
          <path d="M8 11h4M8 14h3"/>
        </svg>
        PDFs
      </button>
    </div>

    <nav class="chat-list" id="chat-list"></nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">JB</div>
        <div class="user-info">
          <span class="user-name">Julio Cesar Bustamante Velasco</span>
          <span class="user-role">Gestor de Asuntos Públicos</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-area" id="chat-area"></div>

    <div class="input-area">
      <div id="cmd-chips" class="cmd-chips">
        <button class="chip" data-cmd="Dame un listado de los temas que se debatieron en esta sesión, los que se votaron y cuál fue el resultado de las votaciones o acuerdos.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="9" cy="9" r="7"/>
            <path d="M7 6.5l5 2.5-5 2.5V6.5z" stroke-linejoin="round"/>
          </svg>
          Sesión
        </button>
        <button class="chip" data-cmd="Resume la fórmula legal de este proyecto de ley y resalta si modifica alguna ley vigente o cambia algún plazo o procedimiento actual.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="2" width="12" height="14" rx="1.5"/>
            <path d="M6 6h6M6 9h6M6 12h4"/>
          </svg>
          Proyecto de Ley
        </button>
        <button class="chip" data-cmd="Dime en qué comisiones se ha derivado este proyecto para su estudio, los actos de trabajo y pedidos de opinión con fechas en cada comisión. Si existe predictamen, indícame de qué fecha es.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="3" width="14" height="12" rx="1.5"/>
            <path d="M2 7h14M6 3v4M12 3v4"/>
            <path d="M5 10h4M5 13h6"/>
          </svg>
          Expediente
        </button>
        <button class="chip" data-cmd="Indícame en un cuadro con fecha, hora, lugar y link de la agenda las sesiones de comisiones de los próximos 2 días.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="4" width="14" height="12" rx="1.5"/>
            <path d="M6 2v4M12 2v4M2 8h14"/>
          </svg>
          Comisiones
        </button>
        <button class="chip" data-cmd="Dame un resumen de la estructura de la Agenda del Pleno: cuántos dictámenes, denuncias constitucionales, mociones y otros puntos hay agendados.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="4" y="2" width="10" height="14" rx="1"/>
            <path d="M7 5h4M7 8h4M7 11h2"/>
            <path d="M1 15h16" stroke-width="1.4"/>
          </svg>
          Agenda del Pleno
        </button>
        <button class="chip" data-cmd="Indícame si se ha presentado alguna moción de interpelación a algún Ministro, o si hay noticias de alguna moción sobre la que se estén juntando firmas.">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="9" cy="6" r="3"/>
            <path d="M3 15c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
            <path d="M9 11v2M9 14v.5" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Interpelaciones
        </button>
        <button class="chip chip-resumen" id="resumen-btn">
          <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="2" width="14" height="14" rx="2"/>
            <path d="M5 6h8M5 9h8M5 12h5"/>
            <path d="M12 11l2 2 3-3" stroke-width="1.6"/>
          </svg>
          Resumen semanal
        </button>
      </div>

      <!-- Panel PDFs del Congreso -->
      <div id="congreso-pdf-panel" style="display:none">
        <div class="cpdf-header">
          <span>PDFs del Congreso</span>
          <button id="cpdf-close">✕</button>
        </div>
        <div id="cpdf-list"><div class="cpdf-loading">Cargando...</div></div>
      </div>

      <div class="input-wrap">
        <label id="pdf-btn" title="Subir PDF desde tu computadora">
          <input type="file" id="pdf-input" accept=".pdf" style="display:none">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4a2 2 0 0 1 2-2h5l5 5v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/>
            <path d="M11 2v5h5M8 13v-4M8 9l2 2 2-2"/>
          </svg>
        </label>
        <button id="congreso-pdf-btn" title="PDFs del Congreso">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="20" width="14" height="2" rx=".5"/>
            <rect x="5" y="9" width="2" height="11" rx=".5"/>
            <rect x="9" y="9" width="2" height="11" rx=".5"/>
            <rect x="13" y="9" width="2" height="11" rx=".5"/>
            <path d="M1 9h18M10 2L1 9h18L10 2z"/>
          </svg>
        </button>
        <textarea id="msg-input" placeholder="Escribe un mensaje…" rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2l8 16-8-4-8 4z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>

    <!-- Vista Live — transcripción en vivo -->
    <div id="view-live" style="display:none;position:absolute;inset:0;z-index:10;background:#fff;">
      <iframe id="live-iframe" src="" style="width:100%;height:100%;border:none;"></iframe>
    </div>

    <!-- Vista PDFs del Congreso -->
    <div id="view-pdfs" style="display:none;position:absolute;inset:0;z-index:10;background:#f7f8fa;">
      <iframe id="pdfs-iframe" src="" style="width:100%;height:100%;border:none;"></iframe>
    </div>

  </main>
</div>

<!-- Modal resumen -->
<div id="resumen-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-box--wide">
    <div class="modal-title">¿En qué enfocamos el resumen?</div>
    <div class="modal-subtitle">Lex ajustará el análisis según el sector de tu cliente</div>
    <div class="modal-sectors">
      <button class="sector-btn" data-sector="general">
        <span class="sector-icon">🏛️</span>
        <span class="sector-label">General</span>
        <span class="sector-desc">Toda la actividad del Congreso</span>
      </button>
      <button class="sector-btn" data-sector="minería y energía">
        <span class="sector-icon">⛏️</span>
        <span class="sector-label">Minería / Energía</span>
        <span class="sector-desc">Concesiones, canon, regulación</span>
      </button>
      <button class="sector-btn" data-sector="salud y farmacéutico">
        <span class="sector-icon">🏥</span>
        <span class="sector-label">Salud / Farma</span>
        <span class="sector-desc">Medicamentos, ESSALUD, SIS</span>
      </button>
      <button class="sector-btn" data-sector="infraestructura y construcción">
        <span class="sector-icon">🏗️</span>
        <span class="sector-label">Infraestructura</span>
        <span class="sector-desc">Obras, APP, contrataciones</span>
      </button>
      <button class="sector-btn" data-sector="sector financiero y tributario">
        <span class="sector-icon">💼</span>
        <span class="sector-label">Financiero / Tributos</span>
        <span class="sector-desc">Banca, impuestos, MEF</span>
      </button>
      <button class="sector-btn" data-sector="agroindustria y comercio exterior">
        <span class="sector-icon">🌾</span>
        <span class="sector-label">Agro / Exportaciones</span>
        <span class="sector-desc">Agroexportación, aduanas, TLC</span>
      </button>
    </div>
    <button class="modal-cancel" id="resumen-cancel">Cancelar</button>
  </div>
</div>

<!-- SVG sprites (reused across JS-generated content) -->
<svg style="display:none">
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </symbol>
  <symbol id="icon-building" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
    <rect x="3" y="20" width="18" height="2" rx=".5"/>
    <rect x="5" y="9" width="3" height="11" rx=".5"/>
    <rect x="10.5" y="9" width="3" height="11" rx=".5"/>
    <rect x="16" y="9" width="3" height="11" rx=".5"/>
    <path d="M1 9h22M12 2L1 9h22L12 2z" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-chat" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
    <path d="M3 4h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H7l-4 2V5a1 1 0 0 1 1-1z" stroke-linejoin="round"/>
  </symbol>
</svg>

<script src="/static/app.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');</script>
</body>
</html>
