<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente Congreso Perú</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Dot-wave background canvas -->
<canvas id="bg-canvas"></canvas>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-icon">🏛</span>
        <span class="logo-name">Congreso IA</span>
      </div>
      <button id="new-chat-btn" title="Nueva conversación">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>

    <nav class="chat-list" id="chat-list">
      <!-- populated by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="api-field">
        <label class="api-label">API Key Groq</label>
        <input type="password" id="api-key-input" class="api-input" placeholder="gsk_...">
        <a href="https://console.groq.com" target="_blank" class="api-link">Obtén la tuya gratis →</a>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-area" id="chat-area">
      <!-- welcome or messages inserted here by JS -->
    </div>

    <div class="input-area">
      <div id="cmd-chips" class="cmd-chips">
        <button class="chip" data-cmd="Revisar proyectos de ley del Congreso">📋 Proyectos de ley</button>
        <button class="chip" data-cmd="Revisar sesiones del Congreso">🎥 Sesiones</button>
        <button class="chip" data-cmd="Revisar agendas del Congreso">📅 Agendas</button>
        <button class="chip" data-cmd="Revisar destacados del Congreso">📌 Destacados</button>
      </div>
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M12 3l8 18-8-4-8 4z"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>
  </main>

</div>

<script src="/static/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
